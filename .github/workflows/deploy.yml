name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'assets/**'
      - '404.html'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'site.webmanifest'
      - '.nojekyll'

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync dress image map
        run: npm run sync:images

      - name: Build site
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Add custom domain file
        run: echo 'ueman.studio' > dist/CNAME

      - name: Sync deploy files to repository root
        run: |
          mkdir -p assets
          cp -R public/assets/. assets/
          cp -R dist/assets/. assets/
          cp dist/404.html .
          cp dist/robots.txt .
          cp dist/sitemap.xml .
          cp dist/site.webmanifest .
          printf '' > .nojekyll

      - name: Commit deploy files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets 404.html robots.txt sitemap.xml site.webmanifest .nojekyll
          if git diff --cached --quiet; then
            echo "No deploy file changes to commit."
            exit 0
          fi
          git commit -m "Deploy site assets [skip ci]"
          git push origin HEAD:main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages